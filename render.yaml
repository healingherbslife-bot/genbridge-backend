services:
  - type: web
    name: genbridge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: genbridge-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
      - key: TOKEN_EXPIRY_H
        value: "24"

databases:
  - name: genbridge-db
    databaseName: genbridge
    user: genbridge_user
